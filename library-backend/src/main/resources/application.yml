spring:
  application:
    name: library-backend

  profiles:
    active: h2

  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    url: jdbc:h2:mem:library;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.library.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: library-secret-key-2024-very-long-and-secure-key-for-jwt-token-generation
  expiration: 86400000

knife4j:
  enable: true
  setting:
    language: zh_CN

server:
  port: 8080
  servlet:
    context-path: /api
